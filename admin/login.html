<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Administrativo — NuevaTel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #010407; --card: #060d1a; --border: #0e2040;
      --accent: #00b4d8; --green: #4caf50; --text: #ddeeff;
      --text-muted: #5a7a9a; --text-dim: #7a9ab0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(76,175,80,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,119,182,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(0,100,180,0.15); top: -100px; right: -100px; }
    .orb2 { width: 300px; height: 300px; background: rgba(40,160,60,0.1); bottom: 0; left: -50px; }

    .login-wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 24px; }
    .login-card {
      background: var(--card); border: 1px solid rgba(76,175,80,0.2);
      border-radius: 20px; padding: 44px 40px;
      box-shadow: 0 0 60px rgba(76,175,80,0.05), 0 0 100px rgba(0,119,182,0.08);
    }
    .login-logo { text-align: center; margin-bottom: 8px; }
    .login-logo img { height: 52px; width: auto; }
    .admin-badge {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin: 12px 0 28px; font-size: 0.75em; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: rgba(76,175,80,0.8);
    }
    .admin-badge::before, .admin-badge::after {
      content: ''; flex: 1; height: 1px; background: rgba(76,175,80,0.2);
    }
    .login-title { font-family: 'Syne', sans-serif; font-size: 1.35em; font-weight: 800; color: #fff; text-align: center; margin-bottom: 6px; }
    .login-sub { text-align: center; color: var(--text-muted); font-size: 0.83em; margin-bottom: 28px; }
    .field-wrap { margin-bottom: 16px; }
    .field-label { font-size: 0.78em; font-weight: 600; color: #6fcf72; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(76,175,80,0.2);
      border-radius: 10px; padding: 13px 18px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.9em; outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #6fcf72; }
    .btn-login {
      width: 100%; margin-top: 8px;
      background: linear-gradient(135deg, #0077b6, #00b4d8);
      color: #fff; border: none; padding: 14px; border-radius: 10px;
      font-size: 1em; font-weight: 700; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0,180,216,0.25);
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,180,216,0.4); }
    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5; padding: 10px 14px; border-radius: 8px;
      font-size: 0.83em; margin-bottom: 16px; display: none; text-align: center;
    }
    .error-msg.show { display: block; }
    .back-link { text-align: center; margin-top: 20px; font-size: 0.82em; color: var(--text-muted); }
    .back-link a { color: var(--accent); }
    .security-note {
      margin-top: 24px; padding: 10px 14px;
      background: rgba(0,180,216,0.05); border: 1px solid rgba(0,180,216,0.1);
      border-radius: 8px; font-size: 0.75em; color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <a href="/nuevatel/">
        <img src="../img/logo.png" alt="NuevaTel PCS" />
      </a>
    </div>
    <div class="admin-badge">🔐 Acceso restringido</div>
    <h2 class="login-title">Panel Administrativo</h2>
    <p class="login-sub">Solo personal autorizado de NuevaTel</p>

    <div class="error-msg" id="errMsg">Credenciales incorrectas. Acceso denegado.</div>

    <form action="../php/auth_admin.php" method="POST">
      <div class="field-wrap">
        <label class="field-label">Usuario administrador</label>
        <input type="text" name="usuario" class="form-input" placeholder="Usuario" autocomplete="off" />
      </div>
      <div class="field-wrap">
        <label class="field-label">Contraseña</label>
        <input type="password" name="password" class="form-input" placeholder="Contraseña" />
      </div>
      <button type="submit" class="btn-login">Acceder al sistema →</button>
    </form>

    <div class="back-link">
      <a href="/nuevatel/">← Volver al sitio principal</a>
    </div>
    <div class="security-note">
      🔒 Acceso monitoreado · Solo uso interno NuevaTel PCS
    </div>
  </div>
</div>
</body>
</html>
